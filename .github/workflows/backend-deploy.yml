name: Backend CI/CD — Hardened

on:
  push:
    branches: [main]
    paths:
      - "angavu-intelligence-backend/**"
      - ".github/workflows/backend-deploy.yml"
  pull_request:
    branches: [main]
    paths:
      - "angavu-intelligence-backend/**"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/backend
  PYTHON_VERSION: "3.12"

permissions:
  contents: read
  packages: write
  id-token: write
  security-events: write

concurrency:
  group: backend-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────
  # Stage 1: Security Gates
  # ──────────────────────────────────────
  secret-scan:
    name: 🔒 Secret Detection
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: TruffleHog scan
        uses: trufflesecurity/trufflehog@33d9daddb1f521c32e89aeb2ca5fce45e9980aac  # main
        with:
          extra_args: --only-verified --fail

  # ──────────────────────────────────────
  # Stage 2: Quality Gate
  # ──────────────────────────────────────
  quality:
    name: "🔍 Quality Gate"
    runs-on: ubuntu-latest
    needs: [secret-scan]
    defaults:
      run:
        working-directory: angavu-intelligence-backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]" 2>/dev/null || pip install -r requirements.txt
          pip install ruff bandit[toml] mypy pip-audit pytest-cov

      - name: Ruff lint (with security rules)
        run: ruff check app/ tests/

      - name: Ruff format check
        run: ruff format --check app/ tests/

      - name: Bandit security scan
        run: |
          bandit -r app/ -c pyproject.toml -f json -o ../bandit-report.json --severity-level medium || true
          HIGH=$(python3 -c "
          import json
          data = json.load(open('../bandit-report.json'))
          print(sum(1 for r in data.get('results', []) if r.get('issue_severity') == 'HIGH'))
          " 2>/dev/null || echo "0")
          if [ "$HIGH" -gt 0 ]; then
            echo "::error::Bandit found $HIGH high-severity issues"
            exit 1
          fi

      - name: mypy strict (security module)
        run: |
          mypy app/core/security/ --strict --ignore-missing-imports --no-error-summary || true

      - name: pip-audit
        run: |
          pip-audit --requirement requirements.txt --desc 2>&1 | tee ../pip-audit.txt || true

      - name: Safety check
        run: safety check --full-report
        continue-on-error: true

      - name: Run tests with 80% coverage gate
        run: |
          pytest tests/ \
            --cov=app \
            --cov-report=xml:../coverage.xml \
            --cov-report=term-missing \
            --cov-fail-under=80 \
            -v --tb=short \
            --timeout=60

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            coverage.xml
            angavu-intelligence-backend/htmlcov/
          retention-days: 14

  # ──────────────────────────────────────
  # Stage 3: Build & Push Docker Image
  # ──────────────────────────────────────
  build:
    name: "🐳 Build & Push Image"
    needs: quality
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
      image-digest: ${{ steps.build.outputs.digest }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: angavu-intelligence-backend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ──────────────────────────────────────
  # Stage 4: Container Security Scan
  # ──────────────────────────────────────
  container-scan:
    name: "🐳 Trivy Scan"
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Run Trivy on pushed image
        uses: aquasecurity/trivy-action@c07df6fec6fa692e6fd1200d50aaa1fdd66f03c8  # master
        with:
          image-ref: ${{ needs.build.outputs.image-tag }}
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

  # ──────────────────────────────────────
  # Stage 5: Deploy to Oracle Cloud
  # ──────────────────────────────────────
  deploy:
    name: "🚀 Deploy"
    needs: [build, container-scan]
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://api.angavu.ai
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Oracle Cloud
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_KEY: ${{ secrets.DEPLOY_KEY }}
          IMAGE_TAG: ${{ needs.build.outputs.image-digest }}
        run: |
          # Configure SSH — trap ensures key cleanup even on failure
          mkdir -p ~/.ssh
          echo "$DEPLOY_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          trap 'rm -f ~/.ssh/deploy_key' EXIT
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts 2>/dev/null

          # Deploy with rolling update
          ssh -i ~/.ssh/deploy_key "${DEPLOY_USER}@${DEPLOY_HOST}" \
            "docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${IMAGE_TAG} && \
             docker compose -f /opt/angavu/docker-compose.yml up -d --force-recreate --no-deps backend && \
             echo '✅ Deployed successfully'"

          echo '✅ Deploy step complete (key auto-cleaned via trap)'

      - name: Health check
        run: |
          for i in $(seq 1 12); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://api.angavu.ai/health || true)
            if [ "$STATUS" = "200" ]; then
              echo "✅ Health check passed"
              exit 0
            fi
            echo "⏳ Attempt $i/12 — status $STATUS, waiting 10s..."
            sleep 10
          done
          echo "❌ Health check failed after 2 minutes"
          exit 1

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Backend deployment failed. Check logs and consider rollback."
