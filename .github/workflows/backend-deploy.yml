name: Backend CI/CD

on:
  push:
    branches: [main]
    paths:
      - "angavu-intelligence-backend/**"
      - ".github/workflows/backend-deploy.yml"
  pull_request:
    branches: [main]
    paths:
      - "angavu-intelligence-backend/**"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/backend

permissions:
  contents: read
  packages: write
  id-token: write

concurrency:
  group: backend-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────
  # Stage 1: Lint + Type Check + Test
  # ──────────────────────────────────────
  quality:
    name: "Quality Gate"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: angavu-intelligence-backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff lint
        run: ruff check app/ tests/

      - name: Ruff format check
        run: ruff format --check app/ tests/

      - name: Mypy type check
        run: mypy app/ --ignore-missing-imports
        continue-on-error: true  # Non-blocking initially; make blocking after stabilization

      - name: Bandit security scan
        run: bandit -r app/ -c pyproject.toml

      - name: Safety dependency audit
        run: safety check --full-report
        continue-on-error: true  # Advisory; block once policy is defined

      - name: Run tests
        run: pytest --tb=short -q

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: angavu-intelligence-backend/htmlcov/
          retention-days: 14

  # ──────────────────────────────────────
  # Stage 2: Build + Push Docker Image
  # ──────────────────────────────────────
  build:
    name: "Build & Push Image"
    needs: quality
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
      image-digest: ${{ steps.build.outputs.digest }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: angavu-intelligence-backend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ──────────────────────────────────────
  # Stage 3: Deploy to Production
  # ──────────────────────────────────────
  deploy:
    name: "Deploy"
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://api.angavu.ai
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to server
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_KEY: ${{ secrets.DEPLOY_KEY }}
          IMAGE_TAG: ${{ needs.build.outputs.image-digest }}
        run: |
          # Configure SSH
          mkdir -p ~/.ssh
          echo "$DEPLOY_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts 2>/dev/null

          # Trigger rolling update
          ssh -i ~/.ssh/deploy_key "${DEPLOY_USER}@${DEPLOY_HOST}" \
            "docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${IMAGE_TAG} && \
             docker compose -f /opt/angavu/docker-compose.yml up -d --force-recreate --no-deps backend && \
             echo '✅ Deployed successfully'"

          # Cleanup
          rm -f ~/.ssh/deploy_key

      - name: Health check
        run: |
          for i in $(seq 1 12); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://api.angavu.ai/health || true)
            if [ "$STATUS" = "200" ]; then
              echo "✅ Health check passed"
              exit 0
            fi
            echo "⏳ Attempt $i/12 — status $STATUS, waiting 10s..."
            sleep 10
          done
          echo "❌ Health check failed after 2 minutes"
          exit 1

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Backend deployment failed. Check logs and consider rollback."
