<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1B4965"/>
      <stop offset="100%" stop-color="#0F2D42"/>
    </linearGradient>
    <radialGradient id="glow" cx="18%" cy="50%" r="30%">
      <stop offset="0%" stop-color="#E8A838" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#E8A838" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="roundClip">
      <rect width="1200" height="400" rx="24" ry="24"/>
    </clipPath>
  </defs>

  <g clip-path="url(#roundClip)">
    <!-- Background -->
    <rect width="1200" height="400" fill="url(#bgGrad)"/>
    <rect width="1200" height="400" fill="url(#glow)"/>

    <!-- Subtle grid pattern -->
    <pattern id="grid" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <rect width="40" height="40" fill="none"/>
      <path d="M40 0 L0 0 0 40" fill="none" stroke="#1E5577" stroke-width="0.3" opacity="0.2"/>
    </pattern>
    <rect width="1200" height="400" fill="url(#grid)"/>

    <!-- Left section: Africa silhouette with eye overlay -->
    <g transform="translate(200, 200)">
      <!-- Concentric guide circles -->
      <circle r="155" fill="none" stroke="#1E5577" stroke-width="0.8" opacity="0.3"/>
      <circle r="142" fill="none" stroke="#1E5577" stroke-width="0.6" opacity="0.2"/>

      <!-- Africa continent silhouette -->
      <g transform="scale(1.6)" opacity="0.25">
        <path d="M-8,-90 C2,-95 12,-93 20,-88 C28,-82 32,-72 34,-62
                 C36,-50 38,-40 42,-30 C46,-18 52,-8 56,2
                 C59,10 58,18 54,26 C50,34 46,40 44,48
                 C42,56 38,64 32,72 C26,78 18,82 10,84
                 C4,85 -2,84 -8,80 C-14,74 -18,66 -22,56
                 C-26,46 -30,36 -34,24 C-38,14 -42,4 -44,-6
                 C-46,-16 -46,-26 -42,-36 C-38,-46 -32,-54 -26,-64
                 C-20,-72 -14,-80 -8,-86 Z"
             fill="#E8A838"/>
        <ellipse cx="52" cy="42" rx="4" ry="10" fill="#E8A838" transform="rotate(12,52,42)"/>
      </g>

      <!-- Eye icon with concentric arcs -->
      <path d="M-100,0 A100,80 0 0 1 100,0" fill="none" stroke="#E8A838" stroke-width="2.5" opacity="0.25"/>
      <path d="M-78,0 A78,62 0 0 1 78,0" fill="none" stroke="#E8A838" stroke-width="2.5" opacity="0.45"/>
      <path d="M-56,0 A56,44 0 0 1 56,0" fill="none" stroke="#E8A838" stroke-width="3" opacity="0.7"/>
      <path d="M-36,0 A36,28 0 0 1 36,0" fill="none" stroke="#E8A838" stroke-width="3.5" opacity="0.9"/>

      <circle cx="0" cy="0" r="18" fill="none" stroke="#E8A838" stroke-width="3"/>
      <circle cx="0" cy="0" r="8" fill="#E8A838"/>
      <circle cx="5" cy="-5" r="3" fill="#FFFFFF" opacity="0.6"/>

      <path d="M-100,0 A100,80 0 0 0 100,0" fill="none" stroke="#E8A838" stroke-width="1.5" opacity="0.12"/>
      <path d="M-78,0 A78,62 0 0 0 78,0" fill="none" stroke="#E8A838" stroke-width="1.5" opacity="0.18"/>
    </g>

    <!-- Right section: Text -->
    <g transform="translate(420, 0)">
      <!-- ANGAVU -->
      <text x="0" y="175" font-family="'Arial Black','Arial',Helvetica,sans-serif" font-size="82" font-weight="900" fill="#FFFFFF" letter-spacing="8">ANGAVU</text>

      <!-- INTELLIGENCE -->
      <text x="4" y="230" font-family="Arial,Helvetica,sans-serif" font-size="42" font-weight="400" fill="#E8A838" letter-spacing="12" opacity="0.95">INTELLIGENCE</text>

      <!-- Tagline bar -->
      <line x1="4" y1="252" x2="730" y2="252" stroke="#E8A838" stroke-width="1.5" opacity="0.4"/>

      <!-- Tagline text -->
      <text x="4" y="285" font-family="Arial,Helvetica,sans-serif" font-size="18" font-weight="300" fill="#FFFFFF" letter-spacing="4" opacity="0.65">CLARITY FOR AFRICA'S INVISIBLE ECONOMY</text>
    </g>

    <!-- Corner accent dots -->
    <circle cx="42" cy="42" r="3" fill="#E8A838" opacity="0.5"/>
    <circle cx="1158" cy="42" r="3" fill="#E8A838" opacity="0.5"/>
    <circle cx="42" cy="358" r="3" fill="#E8A838" opacity="0.5"/>
    <circle cx="1158" cy="358" r="3" fill="#E8A838" opacity="0.5"/>
  </g>

  <!-- Rounded border -->
  <rect x="1.5" y="1.5" width="1197" height="397" rx="24" ry="24" fill="none" stroke="#E8A838" stroke-width="1" opacity="0.15"/>
</svg>
