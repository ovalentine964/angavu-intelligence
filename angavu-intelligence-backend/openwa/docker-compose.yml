# FIX 7: Docker Compose for OpenWA + Whisper + Backend
#
# Key fixes:
# - All services communicate via Docker service names (not localhost)
# - OpenWA session persisted to named volume
# - Environment variables for all configuration
# - Health checks on all services

version: "3.9"

services:
  # ── OpenWA (WhatsApp Web Automation) ──────────────────────────
  openwa:
    build: .
    container_name: angavu-openwa
    restart: unless-stopped
    environment:
      # FIX 1: Port from env var, not hardcoded
      - OPENWA_PORT=${OPENWA_PORT:-3000}
      - OPENWA_HOST=0.0.0.0
      - OPENWA_SESSION_PATH=/app/session
      - OPENWA_SESSION_NAME=angavu-session
      # FIX 1: Backend URL uses Docker service name, not localhost
      - BACKEND_URL=http://backend:8000
      - BACKEND_WEBHOOK_SECRET=${BACKEND_WEBHOOK_SECRET}
      # Rate limiting
      - RATE_LIMIT_WINDOW_MS=${RATE_LIMIT_WINDOW_MS:-60000}
      - RATE_LIMIT_MAX_REQUESTS=${RATE_LIMIT_MAX_REQUESTS:-100}
      - RATE_LIMIT_GLOBAL_MAX=${RATE_LIMIT_GLOBAL_MAX:-500}
      # Reconnection
      - RECONNECT_MAX_ATTEMPTS=${RECONNECT_MAX_ATTEMPTS:-10}
      - RECONNECT_BASE_DELAY_MS=${RECONNECT_BASE_DELAY_MS:-1000}
      - RECONNECT_MAX_DELAY_MS=${RECONNECT_MAX_DELAY_MS:-60000}
      # Logging
      - LOG_LEVEL=${LOG_LEVEL:-info}
    volumes:
      # FIX 4: Session persistence — survives container restarts
      - openwa-session:/app/session
    ports:
      # Only expose if needed externally; prefer internal network
      - "${OPENWA_EXTERNAL_PORT:-127.0.0.1:3000}:3000"
    networks:
      - angavu-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      start_period: 15s
      retries: 3

  # ── Whisper STT (Speech-to-Text) ──────────────────────────────
  whisper:
    image: onerahmet/openai-whisper-asr-webservice:latest
    container_name: angavu-whisper
    restart: unless-stopped
    environment:
      - ASR_MODEL=base
    volumes:
      - whisper-models:/root/.cache
    networks:
      - angavu-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9000/health"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3

  # ── Backend (Python FastAPI) ──────────────────────────────────
  backend:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: angavu-backend
    restart: unless-stopped
    environment:
      # FIX 1: OpenWA URL uses Docker service name
      - OPENWA_URL=http://openwa:3000
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - JWT_PRIVATE_KEY_PATH=${JWT_PRIVATE_KEY_PATH:-keys/jwt_private.pem}
      - JWT_PUBLIC_KEY_PATH=${JWT_PUBLIC_KEY_PATH:-keys/jwt_public.pem}
      # Phone encryption key (32 bytes hex-encoded)
      - PHONE_ENCRYPTION_KEY=${PHONE_ENCRYPTION_KEY}
    ports:
      - "${BACKEND_EXTERNAL_PORT:-127.0.0.1:8000}:8000"
    networks:
      - angavu-network
    depends_on:
      openwa:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── Redis (Cache + OTP store) ────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: angavu-redis
    restart: unless-stopped
    volumes:
      - redis-data:/data
    networks:
      - angavu-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

# ── Volumes ──────────────────────────────────────────────────────
volumes:
  openwa-session:
    driver: local
    description: "OpenWA WhatsApp session data (persists across restarts)"
  whisper-models:
    driver: local
    description: "Whisper model cache"
  redis-data:
    driver: local
    description: "Redis persistent data"

# ── Network ──────────────────────────────────────────────────────
networks:
  angavu-network:
    driver: bridge
