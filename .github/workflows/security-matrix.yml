name: 🛡️ Unified Security Matrix

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly security scan — Monday 6AM UTC
    - cron: '0 6 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ══════════════════════════════════════
  #  SECRET DETECTION (all repos)
  # ══════════════════════════════════════
  trufflehog-website:
    name: 🔑 Secrets — Website
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: TruffleHog scan
        uses: trufflesecurity/trufflehog@33d9daddb1f521c32e89aeb2ca5fce45e9980aac  # main
        with:
          extra_args: --only-verified --fail

  trufflehog-backend:
    name: 🔑 Secrets — Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          path: backend
      - name: TruffleHog scan
        uses: trufflesecurity/trufflehog@33d9daddb1f521c32e89aeb2ca5fce45e9980aac  # main
        with:
          path: backend
          extra_args: --only-verified --fail

  # ══════════════════════════════════════
  #  DEPENDENCY SCANNING
  # ══════════════════════════════════════
  pip-audit:
    name: 📦 pip-audit — Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: backend

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install & audit
        run: |
          cd backend
          pip install --upgrade pip pip-audit
          pip install -r requirements.txt
          pip-audit --requirement requirements.txt --desc

  trivy-filesystem:
    name: 📦 Trivy Filesystem Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy (filesystem mode)
        uses: aquasecurity/trivy-action@c07df6fec6fa692e6fd1200d50aaa1fdd66f03c8  # master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-fs.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-fs.sarif'

  # ══════════════════════════════════════
  #  STATIC ANALYSIS (security-focused)
  # ══════════════════════════════════════
  bandit:
    name: 🔬 Bandit — Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: backend

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run Bandit
        run: |
          pip install bandit[toml]
          cd backend
          bandit -r app/ -c pyproject.toml -f json -o ../bandit-report.json --severity-level medium 2>&1 | tee ../bandit-output.txt || true

          HIGH=$(python3 -c "
          import json
          data = json.load(open('../bandit-report.json'))
          print(sum(1 for r in data.get('results', []) if r.get('issue_severity') == 'HIGH'))
          " 2>/dev/null || echo "0")
          echo "High-severity: $HIGH"
          if [ "$HIGH" -gt 0 ]; then
            echo "::error::Bandit found $HIGH high-severity security issues"
            exit 1
          fi

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bandit-security-report
          path: bandit-report.json

  # ══════════════════════════════════════
  #  LICENSE COMPLIANCE
  # ══════════════════════════════════════
  license-check:
    name: 📜 License Compliance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Check backend licenses
        run: |
          pip install pip-licenses
          pip install -r requirements.txt 2>/dev/null || true
          pip-licenses \
            --format=json \
            --output-file=licenses-backend.json \
            --with-urls \
            --with-authors \
            --allow-only="MIT;BSD;Apache-2.0;ISC;PSF-2.0;Python-2.0;MPL-2.0;0BSD;Unlicense;CC0-1.0" 2>&1 | tee license-output.txt || true

          # Check for copyleft licenses (GPL, AGPL)
          COPYLEFT=$(python3 -c "
          import json
          try:
              data = json.load(open('licenses-backend.json'))
              gpl = [p for p in data if 'GPL' in p.get('License', '') and 'LGPL' not in p.get('License', '')]
              for p in gpl:
                  print(f\"⚠️  {p['Name']} ({p['Version']}): {p['License']}\")
              print(len(gpl))
          except:
              print(0)
          " 2>/dev/null || echo "0")
          if [ "$COPYLEFT" != "0" ]; then
            echo "::warning::Found copyleft-licensed dependencies — review required"
          fi

      - name: Upload license report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: license-report
          path: |
            licenses-backend.json
            license-output.txt

  # ══════════════════════════════════════
  #  SECURITY SUMMARY
  # ══════════════════════════════════════
  summary:
    name: 📊 Security Summary
    runs-on: ubuntu-latest
    needs:
      - trufflehog-website
      - trufflehog-backend
      - pip-audit
      - trivy-filesystem
      - bandit
      - license-check
    if: always()
    steps:
      - name: Generate summary
        run: |
          echo "## 🛡️ Security Matrix Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Secret Detection (Website) | ${{ needs.trufflehog-website.result == 'success' && '✅ Pass' || '❌ Fail' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Secret Detection (Backend) | ${{ needs.trufflehog-backend.result == 'success' && '✅ Pass' || '❌ Fail' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| pip-audit (Backend) | ${{ needs.pip-audit.result == 'success' && '✅ Pass' || '❌ Fail' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Trivy Filesystem | ${{ needs.trivy-filesystem.result == 'success' && '✅ Pass' || '❌ Fail' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Bandit (Backend) | ${{ needs.bandit.result == 'success' && '✅ Pass' || '❌ Fail' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| License Compliance | ${{ needs.license-check.result == 'success' && '✅ Pass' || '⚠️ Review' }} |" >> $GITHUB_STEP_SUMMARY

          # Fail if any critical check failed
          if [ "${{ needs.trufflehog-website.result }}" = "failure" ] || \
             [ "${{ needs.trufflehog-backend.result }}" = "failure" ] || \
             [ "${{ needs.bandit.result }}" = "failure" ]; then
            echo ""
            echo "::error::One or more security checks failed"
            exit 1
          fi
