<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1B4965"/>
      <stop offset="100%" stop-color="#0F2D42"/>
    </linearGradient>
    <radialGradient id="glow" cx="18%" cy="50%" r="30%">
      <stop offset="0%" stop-color="#E8A838" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#E8A838" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="roundClip">
      <rect width="1200" height="400" rx="24" ry="24"/>
    </clipPath>
    <filter id="nodeGlow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <g clip-path="url(#roundClip)">
    <rect width="1200" height="400" fill="url(#bgGrad)"/>
    <rect width="1200" height="400" fill="url(#glow)"/>
    <pattern id="grid" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <rect width="40" height="40" fill="none"/>
      <path d="M40 0 L0 0 0 40" fill="none" stroke="#1E5577" stroke-width="0.3" opacity="0.2"/>
    </pattern>
    <rect width="1200" height="400" fill="url(#grid)"/>

    <!-- Neural Network Africa Icon -->
    <g transform="translate(200, 200) scale(1.2)" filter="url(#nodeGlow)">
      <!-- Neural connections -->
      <g stroke="#E8A838" stroke-width="0.8" opacity="0.35" fill="none">
        <line x1="0" y1="-100" x2="-20" y2="-78"/>
        <line x1="0" y1="-100" x2="18" y2="-80"/>
        <line x1="-20" y1="-78" x2="18" y2="-80"/>
        <line x1="-20" y1="-78" x2="-35" y2="-55"/>
        <line x1="18" y1="-80" x2="30" y2="-58"/>
        <line x1="-20" y1="-78" x2="0" y2="-60"/>
        <line x1="18" y1="-80" x2="0" y2="-60"/>
        <line x1="-35" y1="-55" x2="0" y2="-60"/>
        <line x1="30" y1="-58" x2="0" y2="-60"/>
        <line x1="-35" y1="-55" x2="-40" y2="-28"/>
        <line x1="30" y1="-58" x2="38" y2="-30"/>
        <line x1="0" y1="-60" x2="-40" y2="-28"/>
        <line x1="0" y1="-60" x2="38" y2="-30"/>
        <line x1="-35" y1="-55" x2="38" y2="-30"/>
        <line x1="-40" y1="-28" x2="38" y2="-30"/>
        <line x1="-40" y1="-28" x2="-30" y2="0"/>
        <line x1="38" y1="-30" x2="35" y2="0"/>
        <line x1="-40" y1="-28" x2="-18" y2="5"/>
        <line x1="38" y1="-30" x2="18" y2="5"/>
        <line x1="-30" y1="0" x2="-18" y2="5"/>
        <line x1="35" y1="0" x2="18" y2="5"/>
        <line x1="-18" y1="5" x2="18" y2="5"/>
        <line x1="-30" y1="0" x2="18" y2="5"/>
        <line x1="35" y1="0" x2="-18" y2="5"/>
        <line x1="-18" y1="5" x2="-22" y2="35"/>
        <line x1="18" y1="5" x2="22" y2="30"/>
        <line x1="-30" y1="0" x2="-22" y2="35"/>
        <line x1="35" y1="0" x2="22" y2="30"/>
        <line x1="-22" y1="35" x2="22" y2="30"/>
        <line x1="-22" y1="35" x2="-12" y2="55"/>
        <line x1="22" y1="30" x2="12" y2="50"/>
        <line x1="-22" y1="35" x2="12" y2="50"/>
        <line x1="22" y1="30" x2="-12" y2="55"/>
        <line x1="-12" y1="55" x2="12" y2="50"/>
        <line x1="-12" y1="55" x2="0" y2="72"/>
        <line x1="12" y1="50" x2="0" y2="72"/>
        <line x1="-12" y1="55" x2="5" y2="85"/>
        <line x1="12" y1="50" x2="5" y2="85"/>
        <line x1="0" y1="72" x2="5" y2="85"/>
        <line x1="35" y1="0" x2="52" y2="20"/>
        <line x1="22" y1="30" x2="52" y2="20"/>
        <line x1="0" y1="-100" x2="-35" y2="-55"/>
        <line x1="-35" y1="-55" x2="-30" y2="0"/>
        <line x1="-40" y1="-28" x2="-55" y2="-10"/>
        <line x1="-55" y1="-10" x2="-30" y2="0"/>
        <line x1="-55" y1="-10" x2="-40" y2="-28"/>
      </g>

      <!-- 18 Nodes as Africa continent -->
      <circle cx="0" cy="-100" r="5" fill="#E8A838"/>
      <circle cx="-20" cy="-78" r="4.5" fill="#E8A838"/>
      <circle cx="18" cy="-80" r="4.5" fill="#E8A838"/>
      <circle cx="-55" cy="-10" r="4" fill="#E8A838"/>
      <circle cx="-40" cy="-28" r="4.5" fill="#E8A838"/>
      <circle cx="-35" cy="-55" r="4" fill="#E8A838"/>
      <circle cx="30" cy="-58" r="4" fill="#E8A838"/>
      <circle cx="0" cy="-60" r="5.5" fill="#E8A838"/>
      <circle cx="-30" cy="0" r="4.5" fill="#E8A838"/>
      <circle cx="38" cy="-30" r="4.5" fill="#E8A838"/>
      <circle cx="-18" cy="5" r="5" fill="#E8A838"/>
      <!-- ★ KENYA HQ -->
      <circle cx="18" cy="5" r="7" fill="#F0C060" stroke="#FFFFFF" stroke-width="1.5"/>
      <circle cx="-22" cy="35" r="4.5" fill="#E8A838"/>
      <circle cx="22" cy="30" r="4.5" fill="#E8A838"/>
      <circle cx="52" cy="20" r="3.5" fill="#E8A838"/>
      <circle cx="-12" cy="55" r="4.5" fill="#E8A838"/>
      <circle cx="12" cy="50" r="4.5" fill="#E8A838"/>
      <circle cx="0" cy="72" r="5" fill="#E8A838"/>
      <circle cx="5" cy="85" r="4" fill="#E8A838"/>

      <!-- Kenya label -->
      <text x="18" y="-8" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="7" font-weight="700" fill="#FFFFFF" letter-spacing="0.5">KENYA</text>
      <text x="18" y="0" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="5" fill="#FFFFFF" opacity="0.7">HQ</text>
    </g>

    <!-- Right section: Text -->
    <g transform="translate(420, 0)">
      <text x="0" y="175" font-family="'Arial Black','Arial',Helvetica,sans-serif" font-size="82" font-weight="900" fill="#FFFFFF" letter-spacing="8">ANGAVU</text>
      <text x="4" y="230" font-family="Arial,Helvetica,sans-serif" font-size="42" font-weight="400" fill="#E8A838" letter-spacing="12" opacity="0.95">INTELLIGENCE</text>
      <line x1="4" y1="252" x2="730" y2="252" stroke="#E8A838" stroke-width="1.5" opacity="0.4"/>
      <text x="4" y="285" font-family="Arial,Helvetica,sans-serif" font-size="18" font-weight="300" fill="#FFFFFF" letter-spacing="4" opacity="0.65">CLARITY FOR AFRICA'S INVISIBLE ECONOMY</text>
    </g>

    <!-- Corner accent dots -->
    <circle cx="42" cy="42" r="3" fill="#E8A838" opacity="0.5"/>
    <circle cx="1158" cy="42" r="3" fill="#E8A838" opacity="0.5"/>
    <circle cx="42" cy="358" r="3" fill="#E8A838" opacity="0.5"/>
    <circle cx="1158" cy="358" r="3" fill="#E8A838" opacity="0.5"/>
  </g>

  <rect x="1.5" y="1.5" width="1197" height="397" rx="24" ry="24" fill="none" stroke="#E8A838" stroke-width="1" opacity="0.15"/>
</svg>