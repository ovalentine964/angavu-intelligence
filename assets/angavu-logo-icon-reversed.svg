<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="512" height="512">
  <defs>
    <linearGradient id="irisGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E8A838"/>
      <stop offset="100%" stop-color="#E8853D"/>
    </linearGradient>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1B4965"/>
      <stop offset="100%" stop-color="#0F2D40"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="100" height="100" rx="20" fill="url(#bgGradient)"/>
  
  <!-- Upper Arc -->
  <path d="M 18 50 Q 50 18 82 50" 
        fill="none" stroke="#FFFFFF" stroke-width="3.5" stroke-linecap="round"/>
  
  <!-- Lower Arc -->
  <path d="M 18 50 Q 50 82 82 50" 
        fill="none" stroke="#FFFFFF" stroke-width="3.5" stroke-linecap="round"/>
  
  <!-- Inner Ring (lens effect) -->
  <circle cx="50" cy="50" r="17" fill="none" stroke="#FFFFFF" stroke-width="1.2" opacity="0.3"/>
  
  <!-- Iris/Core -->
  <circle cx="50" cy="50" r="13" fill="url(#irisGradient)"/>
  
  <!-- Iris Highlight -->
  <circle cx="46" cy="46" r="4" fill="#F5D78E" opacity="0.6"/>
  
  <!-- Left Pulse Line -->
  <line x1="8" y1="50" x2="30" y2="50" stroke="#E8A838" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
  
  <!-- Right Pulse Line -->
  <line x1="70" y1="50" x2="92" y2="50" stroke="#E8A838" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
  
  <!-- Left Network Node -->
  <circle cx="8" cy="50" r="3.5" fill="#E8A838"/>
  <circle cx="8" cy="50" r="5.5" fill="none" stroke="#E8A838" stroke-width="0.8" opacity="0.4"/>
  
  <!-- Right Network Node -->
  <circle cx="92" cy="50" r="3.5" fill="#E8A838"/>
  <circle cx="92" cy="50" r="5.5" fill="none" stroke="#E8A838" stroke-width="0.8" opacity="0.4"/>
  
  <!-- Pulse Accent Dots -->
  <circle cx="22" cy="50" r="1.5" fill="#E8853D" opacity="0.5"/>
  <circle cx="78" cy="50" r="1.5" fill="#E8853D" opacity="0.5"/>
</svg>
